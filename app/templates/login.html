<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Job Tracker</title>

    <link
        rel="stylesheet"
        href="/static/css/style.css">
</head>

<body>

<div class="hero">

    <h1>Welcome Back</h1>

    <form
        action="/login"
        method="post">

        <div class="form-group">

            <label>Username</label>

            <input
                type="text"
                name="username"
                required>

        </div>

        <div class="form-group">

            <label>Password</label>

            <input
                type="password"
                name="password"
                required>

        </div>

        <button
            type="submit"
            class="primary-button">

            Login

        </button>

        <p class="form-link">
            Don't have an account?
            <a href="/register">Create one here</a>
        </p>

    </form>

</div>

</body>
</html>
